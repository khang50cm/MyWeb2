<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Võ Duy Khang</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #764ba2;
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 {
            margin: 10px 0;
            color: #2d3436;
            font-size: 26px;
        }
        .info-tag {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .details {
            text-align: left;
            margin-top: 20px;
            line-height: 1.8;
        }
        .details b {
            color: #764ba2;
        }
        .status-job {
            margin-top: 15px;
            padding: 10px;
            background: #fdf2f2;
            border-left: 4px solid #ff7675;
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="https://ui-avatars.com/api/?name=Vo+Duy+Khang&background=764ba2&color=fff&size=128" alt="Võ Duy Khang" class="avatar">
        
        <h1>Võ Duy Khang</h1>
        <div class="info-tag">Sinh viên IT - 20 tuổi</div>

        <div class="details">
            <p>📍 <b>Lớp:</b> CDCNTT19</p>
            <p>🏫 <b>Trường:</b> CĐ Kỹ thuật Công nghệ Nha Trang (CDKTCNNT)</p>
            
            <div class="status-job">
                "Hiện tại mình đang vừa học vừa làm Part-time để tích lũy thêm kinh nghiệm thực tế."
            </div>
        </div>
    </div>

</body>
</html>
